<!DOCTYPE html>
<html>
    <head>
        <title>Online Notes</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class = "clear-div">
            <button id = "clearBtn">Delete notes</button>
        </div>
        
        <div class = "logo">
            <h1>Note app</h1>
            <p>Double click on a note to remove it</p>
        </div>

        <div id = "notes" class = "notes">

            <textarea  class = "textareaField" id = "textareaField" placeholder = "Empty Note"></textarea>

            <button id = "addBtn">+</button>
        </div>
        <script src = "main.js"></script>
    </body>
</html>
